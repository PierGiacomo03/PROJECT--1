<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
function initMap() {
  new google.maps.Map(document.getElementById('map'), {
    center: { lat: 42.67, lng: 0.05 },
    zoom: 12
  });
}
</script>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyArytB7MYMy7kgMa9TGrbO9IT_ZQ00ry0M&callback=initMap"></script>
</body>
</html>
