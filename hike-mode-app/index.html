<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HikeMode"/>
<meta name="theme-color" content="#137333"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>HikeMode – Pyrenees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Google Sans', 'Roboto', 'Helvetica Neue', sans-serif; background: #e8eaed; }

  #map { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

  /* ── Top header (search pill + category chips) ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 25;
    padding: env(safe-area-inset-top, 14px) 12px 0;
    pointer-events: none;
  }
  .search-pill {
    background: white; border-radius: 30px;
    box-shadow: 0 2px 8px rgba(60,64,67,.28), 0 1px 3px rgba(60,64,67,.15);
    display: flex; align-items: center; gap: 10px;
    padding: 12px 12px 12px 14px;
    pointer-events: auto;
  }
  .search-back {
    width: 28px; height: 28px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .search-back svg { width: 100%; height: 100%; }

  /* Modern Google Maps pin — conic gradient masked by pin shape + white dot */
  .g-logo {
    width: 30px; height: 30px; flex-shrink: 0; position: relative;
  }
  .g-logo::before {
    content: ''; position: absolute; inset: 0;
    background: conic-gradient(from 0deg at 50% 36%,
      #4285F4 0deg,
      #34A853 100deg,
      #34A853 180deg,
      #FBBC05 230deg,
      #EA4335 300deg,
      #4285F4 360deg);
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C7.58 2 4 5.58 4 10c0 5 5.5 10 7 11.5.5.5 1.5.5 2 0 1.5-1.5 7-6.5 7-11.5 0-4.42-3.58-8-8-8z'/></svg>") center / contain no-repeat;
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C7.58 2 4 5.58 4 10c0 5 5.5 10 7 11.5.5.5 1.5.5 2 0 1.5-1.5 7-6.5 7-11.5 0-4.42-3.58-8-8-8z'/></svg>") center / contain no-repeat;
  }
  .g-logo::after {
    content: ''; position: absolute;
    width: 9px; height: 9px;
    background: white; border-radius: 50%;
    top: 6px; left: 50%; transform: translateX(-50%);
  }
  .search-back {
    display: none; background: none; border: none;
    cursor: pointer; padding: 0;
  }
  .header.search-active .g-logo { display: none; }
  .header.search-active .search-back { display: flex; }
  .header.search-active .chips-row { display: none; }
  .header.search-active .search-pill { box-shadow: 0 1px 3px rgba(0,0,0,.12); }
  .search-pill input {
    border: none; outline: none; flex: 1; font-size: 16px; color: #3c4043;
    background: transparent; padding: 4px 0;
  }
  .search-pill input::placeholder { color: #80868b; }
  .mic-icon, .profile-pic { flex-shrink: 0; }
  .mic-icon { color: #5f6368; font-size: 22px; padding: 0 4px; }
  .profile-pic {
    width: 32px; height: 32px; border-radius: 50%;
    background: #1a73e8; color: white; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; border: none; cursor: pointer;
    overflow: hidden; padding: 0;
  }
  .profile-pic img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .signin-icon {
    width: 18px; height: 18px;
    background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Sign-in modal ── */
  .signin-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.55);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .signin-overlay.open { display: flex; }
  .signin-card {
    background: white; border-radius: 12px;
    max-width: 380px; width: 100%;
    padding: 28px 24px 20px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,.3);
  }
  .signin-card h2 {
    font-size: 20px; font-weight: 500; color: #202124;
    margin-bottom: 6px;
  }
  .signin-card p {
    font-size: 14px; color: #5f6368;
    margin-bottom: 22px; line-height: 1.5;
  }
  .signin-google-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: white; border: 1px solid #dadce0;
    border-radius: 4px; padding: 10px 22px;
    font-size: 14px; font-weight: 500; color: #3c4043;
    cursor: pointer; transition: box-shadow .2s;
  }
  .signin-google-btn:hover { box-shadow: 0 1px 3px rgba(60,64,67,.3); }
  .signin-google-btn svg { width: 18px; height: 18px; }
  .signin-close {
    display: block; margin: 16px auto 0;
    background: none; border: none; cursor: pointer;
    color: #5f6368; font-size: 13px;
  }
  .user-menu {
    position: fixed; top: calc(env(safe-area-inset-top, 14px) + 60px); right: 14px;
    background: white; border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    padding: 14px 18px; z-index: 26;
    display: none; min-width: 220px;
  }
  .user-menu.open { display: block; }
  .user-menu .user-name { font-weight: 600; font-size: 14px; color: #202124; }
  .user-menu .user-email { font-size: 12px; color: #5f6368; margin-top: 2px; }
  .user-menu hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .user-menu .signout {
    background: none; border: none; cursor: pointer;
    color: #1a73e8; font-size: 13px; font-weight: 500; padding: 0;
  }

  /* ── Category chips ── */
  .chips-row {
    display: flex; gap: 8px; padding: 10px 4px 4px;
    overflow-x: auto; scrollbar-width: none;
    pointer-events: auto;
  }
  .chips-row::-webkit-scrollbar { display: none; }
  .chip {
    background: white; border-radius: 20px;
    box-shadow: 0 1px 3px rgba(60,64,67,.2), 0 1px 2px rgba(60,64,67,.1);
    padding: 8px 14px; font-size: 14px; font-weight: 500; color: #3c4043;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
    border: none; cursor: pointer; flex-shrink: 0;
    transition: background .2s, color .2s;
  }
  .chip .chip-icon { font-size: 18px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .chip .chip-icon svg { width: 18px; height: 18px; color: #202124; }
  .chip.active .chip-icon svg { color: white; }
  .chip.active { background: #137333; color: white; box-shadow: 0 2px 8px rgba(19,115,51,.4); }

  /* ── Floating right controls ── */
  .layer-fab {
    position: fixed; right: 12px;
    top: calc(env(safe-area-inset-top, 14px) + 124px);
    width: 44px; height: 44px; border-radius: 50%;
    background: white; border: none; cursor: pointer;
    box-shadow: 0 2px 6px rgba(60,64,67,.28), 0 1px 2px rgba(60,64,67,.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #5f6368; z-index: 22;
  }

  .locate-fab, .directions-fab {
    position: fixed; right: 14px;
    width: 56px; height: 56px; border-radius: 50%;
    cursor: pointer; border: none;
    box-shadow: 0 2px 8px rgba(60,64,67,.3), 0 1px 3px rgba(60,64,67,.15);
    display: flex; align-items: center; justify-content: center;
    z-index: 22;
  }
  .locate-fab {
    bottom: calc(env(safe-area-inset-bottom, 16px) + 156px);
    background: white; font-size: 24px; color: #1a73e8;
    transition: background .2s;
  }
  .locate-fab svg { transition: stroke .2s, fill .2s; }
  .locate-fab.tracking svg { stroke: #1a73e8; fill: #1a73e8; }
  .directions-fab {
    bottom: calc(env(safe-area-inset-bottom, 16px) + 90px);
    background: #00796b; font-size: 24px; color: white;
  }

  /* ── Google Maps watermark ── */
  .gmaps-watermark {
    position: fixed; left: 10px;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 76px);
    font-size: 14px; font-weight: 600; color: #3c4043;
    text-shadow: 0 0 4px white, 0 0 4px white, 0 0 4px white;
    z-index: 20; pointer-events: none;
    font-family: 'Product Sans', 'Google Sans', sans-serif;
  }
  .gmaps-watermark .g { color: #4285f4; }
  .gmaps-watermark .o1 { color: #ea4335; }
  .gmaps-watermark .o2 { color: #fbbc05; }
  .gmaps-watermark .g2 { color: #4285f4; }
  .gmaps-watermark .l { color: #34a853; }
  .gmaps-watermark .e { color: #ea4335; }

  /* ── Layers bottom sheet ── */
  .layers-sheet {
    position: fixed; bottom: -100%; left: 0; right: 0; z-index: 35;
    background: white; border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.18);
    padding: 8px 20px calc(env(safe-area-inset-bottom, 16px) + 80px);
    transition: bottom .35s cubic-bezier(.4,0,.2,1);
    max-height: 85vh; overflow-y: auto;
  }
  .layers-sheet.open { bottom: 0; }
  .layers-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 4px 16px;
  }
  .layers-header h3 { font-size: 22px; font-weight: 400; color: #3c4043; }
  .layers-header .x {
    background: none; border: none; cursor: pointer;
    font-size: 22px; color: #5f6368; padding: 4px 8px;
  }
  .layers-divider { border: none; border-top: 1px solid #f0f0f0; margin: 16px 0; }
  .layers-section-h4 {
    font-size: 22px; font-weight: 400; color: #3c4043;
    margin: 4px 4px 18px;
  }

  /* Map type cards: 3 large rounded squares */
  .map-type-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    padding: 0 2px;
  }
  .map-type-card {
    background: none; border: none; cursor: pointer; padding: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-size: 14px; color: #3c4043; font-weight: 400;
  }
  .map-type-thumb {
    width: 100%; aspect-ratio: 1; border-radius: 14px;
    border: 3px solid transparent;
    overflow: hidden; position: relative;
  }
  .map-type-card.active .map-type-thumb { border-color: #00796b; }
  .map-type-card.active span { color: #00796b; font-weight: 500; }

  .map-type-thumb svg { width: 100%; height: 100%; display: block; }

  /* Map details: grid of 4 square icons */
  .map-details-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 14px;
    padding: 0 2px;
  }
  .detail-card {
    background: none; border: none; cursor: pointer; padding: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-size: 13px; color: #3c4043; font-weight: 400; line-height: 1.15;
    text-align: center;
  }
  .detail-thumb {
    width: 100%; aspect-ratio: 1; border-radius: 14px;
    border: 3px solid transparent;
    overflow: hidden; position: relative;
  }
  .detail-card.active .detail-thumb { border-color: #00796b; }
  .detail-card.active span { color: #00796b; font-weight: 500; }
  .detail-thumb svg { width: 100%; height: 100%; display: block; }

  /* ── Directions panel (Google Maps style: full takeover with two search fields) ── */
  .directions-panel {
    position: fixed; top: -100%; left: 0; right: 0; bottom: auto; z-index: 40;
    background: #1a73e8;
    padding: env(safe-area-inset-top, 14px) 12px 14px;
    transition: top .3s cubic-bezier(.4,0,.2,1);
  }
  .directions-panel.open { top: 0; }
  .directions-header {
    display: flex; align-items: center; gap: 4px; margin-bottom: 12px;
  }
  .directions-back {
    background: none; border: none; cursor: pointer;
    color: white; padding: 8px 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .endpoint-input-wrap {
    display: flex; align-items: center; gap: 12px;
    background: white; border-radius: 4px;
    padding: 4px 14px; margin-bottom: 6px;
    border: 1px solid transparent;
    box-shadow: 0 1px 2px rgba(0,0,0,.12);
  }
  .endpoint-input-wrap.active { border-color: #1a73e8; }
  .endpoint-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .endpoint-dot.start { background: #1a73e8; border: 2px solid #fff; box-shadow: 0 0 0 1px #1a73e8; }
  .endpoint-dot.end   { background: #c62828; }
  .endpoint-input {
    flex: 1; border: none; outline: none;
    font-size: 16px; color: #202124; padding: 12px 0;
    background: transparent;
  }
  .endpoint-input::placeholder { color: #80868b; }
  .endpoint-clear {
    background: none; border: none; cursor: pointer;
    color: #5f6368; font-size: 18px; padding: 4px 8px;
  }

  /* Autocomplete results list */
  .suggestions {
    position: fixed; top: 0; left: 0; right: 0;
    background: white;
    padding: calc(env(safe-area-inset-top, 14px) + 138px) 0 0;
    z-index: 39;
    display: none;
    min-height: 100vh;
  }
  .suggestions.from-search {
    padding: calc(env(safe-area-inset-top, 14px) + 70px) 0 0;
    z-index: 24;
    min-height: 0;
    max-height: 55vh;
    overflow-y: auto;
    border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    -webkit-mask-image: linear-gradient(to bottom, black 0, black calc(100% - 22px), transparent 100%);
            mask-image: linear-gradient(to bottom, black 0, black calc(100% - 22px), transparent 100%);
  }
  .map-tap-hint {
    position: fixed; left: 50%; transform: translateX(-50%);
    top: calc(55vh + 8px);
    background: #202124; color: white;
    padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
    z-index: 25; pointer-events: none;
    display: none;
    white-space: nowrap;
  }
  .map-tap-hint.visible { display: block; }
  .suggestions.visible { display: block; }
  .suggestion-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; cursor: pointer; border: none;
    background: none; width: 100%; text-align: left;
    border-bottom: 1px solid #f0f0f0;
  }
  .suggestion-row:hover { background: #f8f9fa; }
  .suggestion-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: #f1f3f4; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #5f6368;
  }
  .suggestion-icon svg { width: 22px; height: 22px; }
  .suggestion-text { flex: 1; }
  .suggestion-name { font-size: 16px; color: #202124; font-weight: 500; }
  .suggestion-sub { font-size: 13px; color: #5f6368; margin-top: 2px; }

  /* Find route bottom button */
  .find-route-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 41;
    background: white; padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px);
    box-shadow: 0 -2px 12px rgba(0,0,0,.12);
    display: none;
  }
  .find-route-bar.visible { display: block; }
  .find-route-btn {
    width: 100%; padding: 14px;
    background: #1a73e8; color: white;
    border: none; border-radius: 30px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  /* Route summary card (after route found) */
  .route-summary {
    position: fixed; bottom: 76px; left: 12px; right: 12px; z-index: 22;
    background: white; border-radius: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
    padding: 14px 18px;
    display: none;
  }
  .route-summary.visible { display: block; }
  .route-summary-title {
    font-size: 15px; font-weight: 600; color: #1a73e8; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .route-summary-title button {
    background: none; border: none; cursor: pointer; color: #5f6368;
    font-size: 18px;
  }
  .route-summary-stats {
    display: flex; gap: 16px; font-size: 13px; color: #5f6368;
  }
  .route-summary-stats b { color: #202124; font-size: 15px; }

  /* Pulsing user-location dot */
  .user-dot-wrap {
    position: relative; width: 22px; height: 22px;
  }
  .user-dot {
    position: absolute; inset: 0; margin: auto;
    width: 18px; height: 18px; border-radius: 50%;
    background: #1a73e8; border: 3px solid white;
    box-shadow: 0 0 0 1px #1a73e8, 0 2px 4px rgba(0,0,0,.3);
    z-index: 2;
  }
  .user-pulse {
    position: absolute; inset: 0; margin: auto;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(26,115,232,.35);
    animation: userPulse 2s infinite ease-out;
    z-index: 1;
  }
  @keyframes userPulse {
    0%   { transform: scale(1); opacity: .6; }
    100% { transform: scale(4.5); opacity: 0; }
  }

  /* ── Bottom tab bar ── */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
    background: white; box-shadow: 0 -1px 4px rgba(60,64,67,.12);
    display: flex; justify-content: space-around;
    padding: 6px 0 calc(env(safe-area-inset-bottom, 8px) + 4px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 6px 4px;
    background: none; border: none; cursor: pointer;
    color: #5f6368; font-size: 11px; font-weight: 500;
  }
  .tab.active { color: #1a73e8; }
  .tab .tab-icon-wrap {
    padding: 4px 14px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .tab.active .tab-icon-wrap { background: #e8f0fe; }
  .tab .tab-icon { font-size: 20px; line-height: 1; }

  /* ── Trail info sheet (slides up on trail tap) ── */
  .sheet {
    position: fixed; bottom: -260px; left: 0; right: 0; z-index: 30;
    background: white; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.15);
    padding: 12px 20px calc(env(safe-area-inset-bottom, 16px) + 80px);
    transition: bottom .35s cubic-bezier(.4,0,.2,1);
  }
  .sheet.open { bottom: 0; }
  .sheet-handle {
    width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-name { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .sheet-diff {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700; margin-bottom: 14px;
  }
  .sheet-diff.easy     { background: #e8f5e9; color: #2e7d32; }
  .sheet-diff.moderate { background: #fff8e1; color: #f57f17; }
  .sheet-diff.hard     { background: #ffebee; color: #c62828; }
  .sheet-stats {
    display: flex; gap: 0; border: 1px solid #f0f0f0; border-radius: 12px; overflow: hidden;
  }
  .stat {
    flex: 1; padding: 12px 8px; text-align: center;
    border-right: 1px solid #f0f0f0;
  }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .stat-lbl { font-size: 11px; color: #9e9e9e; margin-top: 2px; }
  .close-sheet {
    position: absolute; top: 14px; right: 16px;
    background: #f5f5f5; border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #757575;
  }

  /* ── Legend sheet ── */
  .legend-sheet {
    position: fixed; bottom: -280px; left: 0; right: 0; z-index: 30;
    background: white; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.15);
    padding: 12px 20px calc(env(safe-area-inset-bottom, 16px) + 80px);
    transition: bottom .35s cubic-bezier(.4,0,.2,1);
  }
  .legend-sheet.open { bottom: 0; }
  .legend-title { font-size: 16px; font-weight: 700; color: #137333; margin-bottom: 14px; }
  .legend-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 15px; color: #3c4043; }
  .swatch { width: 32px; height: 6px; border-radius: 3px; flex-shrink: 0; }
  .legend-poi-row { display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid #f0f0f0; margin-top: 4px; }
  .poi-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #5f6368; }
</style>
</head>
<body>

<!-- Header: search pill + category chips -->
<div class="header" id="header">
  <div class="search-pill">
    <div class="g-logo"></div>
    <button class="search-back" onclick="closeMainSearch()" title="Back">
      <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <input type="text" placeholder="Search here" id="mainSearch"
           onfocus="openMainSearch()" oninput="searchAsYouType(this.value)" />
    <span class="mic-icon">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <defs>
          <linearGradient id="micG" x1="0" y1="0" x2="0" y2="1">

function pathDistanceKm(path) {
  let km = 0;
  for (let i = 1; i < path.length; i++) {
    const a = path[i-1], b = path[i];
    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLng = (b.lng - a.lng) * Math.PI / 180;
    const lat1 = a.lat * Math.PI / 180;
    const lat2 = b.lat * Math.PI / 180;
    const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
    km += 2 * R * Math.asin(Math.sqrt(h));
  }
  return km;
}

function estTime(km, difficulty) {
  const speed = difficulty === 'easy' ? 4.5 : difficulty === 'moderate' ? 3.5 : 2.5;
  const hours = km / speed;
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return h > 0 ? `${h}h ${m.toString().padStart(2,'0')}` : `${m} min`;
}

// Min-heap for fast Dijkstra
class MinHeap {
  constructor() { this.h = []; }
  get size() { return this.h.length; }
  push(item) {
    this.h.push(item);
    let i = this.h.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (this.h[p].d <= this.h[i].d) break;
      [this.h[p], this.h[i]] = [this.h[i], this.h[p]]; i = p;
    }
  }
  pop() {
    const top = this.h[0];
    const last = this.h.pop();
    if (this.h.length) {
      this.h[0] = last;
      let i = 0;
      while (true) {
        const l = 2*i+1, r = 2*i+2;
        let s = i;
        if (l < this.h.length && this.h[l].d < this.h[s].d) s = l;
        if (r < this.h.length && this.h[r].d < this.h[s].d) s = r;
        if (s === i) break;
        [this.h[s], this.h[i]] = [this.h[i], this.h[s]]; i = s;
      }
    }
    return top;
  }
}

function segDistanceKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function buildGraph() {
  const CELL = 0.00022; // ~25m clustering — bridges small data gaps
  const cellMap = {};
  const nodes = [];
  const adj = [];

  function nodeFor(p) {
    const k = `${Math.round(p.lat/CELL)}_${Math.round(p.lng/CELL)}`;
    if (cellMap[k] !== undefined) return cellMap[k];
    const id = nodes.length;
    nodes.push({ lat: p.lat, lng: p.lng });
    adj.push([]);
    cellMap[k] = id;
    return id;
  }

  // Each edge stores the FULL geometry between two distinct graph nodes
  // (including intermediate trail points clustered into the same node).
  trails.forEach((t, ti) => {
    let prevId = nodeFor(t.path[0]);
    let segCoords = [t.path[0]];

    for (let i = 1; i < t.path.length; i++) {
      const curId = nodeFor(t.path[i]);
      segCoords.push(t.path[i]);
      if (curId === prevId) continue;

      // Distinct node reached — emit edge with the accumulated geometry
      let w = 0;
      for (let j = 1; j < segCoords.length; j++) w += segDistanceKm(segCoords[j-1], segCoords[j]);
      const fwd = segCoords.slice();
      const bwd = segCoords.slice().reverse();
      adj[prevId].push({ to: curId, weight: w, coords: fwd, difficulty: t.difficulty });
      adj[curId].push({ to: prevId, weight: w, coords: bwd, difficulty: t.difficulty });

      prevId = curId;
      segCoords = [t.path[i]];
    }
  });

  graph = { nodes, adj };
  let edgeCount = 0; adj.forEach(a => edgeCount += a.length);
  console.log(`Graph built: ${nodes.length} nodes, ${edgeCount/2} edges`);
}

function nearestNode(point) {
  let best = -1, bestD = Infinity;
  for (let i = 0; i < graph.nodes.length; i++) {
    const n = graph.nodes[i];
    const d = (n.lat - point.lat) ** 2 + (n.lng - point.lng) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function dijkstra(startId, endId) {
  const dist = new Map(); dist.set(startId, 0);
  const prev = new Map();
  const heap = new MinHeap();
  heap.push({ id: startId, d: 0 });

  while (heap.size) {
    const { id, d } = heap.pop();
    if (id === endId) break;
    if (d > (dist.get(id) ?? Infinity)) continue;
    for (const e of graph.adj[id]) {
      const nd = d + e.weight;
      if (nd < (dist.get(e.to) ?? Infinity)) {
        dist.set(e.to, nd);
        prev.set(e.to, { from: id, edge: e });
        heap.push({ id: e.to, d: nd });
      }
    }
  }

  if (!dist.has(endId)) return null;
  const edges = [];
  let cur = endId;
  while (prev.has(cur)) {
    edges.unshift(prev.get(cur).edge);
    cur = prev.get(cur).from;
  }
  return { edges, distance: dist.get(endId) };
}

// ─── Smooth fly-to (pan + zoom animated together) ───────────────────
const TARGET_RECENTER_ZOOM = 14;
function smoothFlyToUser() {
  if (!map) return;
  const startC = map.getCenter();
  const startCLat = startC.lat(), startCLng = startC.lng();
  const startZ = map.getZoom();
  const targetZ = TARGET_RECENTER_ZOOM;
  const duration = 900; // ms
  const t0 = performance.now();
  function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }
  function step(now) {
    const t = Math.min((now - t0) / duration, 1);
    const e = easeInOut(t);
    map.setCenter({
      lat: startCLat + (USER_LOCATION.lat - startCLat) * e,
      lng: startCLng + (USER_LOCATION.lng - startCLng) * e,
    });
    map.setZoom(startZ + (targetZ - startZ) * e);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function addUserLocationDot() {
  class UserDotOverlay extends google.maps.OverlayView {
    constructor(position) { super(); this.position = position; }
    onAdd() {
      this.div = document.createElement('div');
      this.div.className = 'user-dot-wrap';
      this.div.style.position = 'absolute';
      this.div.innerHTML = '<div class="user-pulse"></div><div class="user-dot"></div>';
      this.getPanes().overlayMouseTarget.appendChild(this.div);
    }
    draw() {
      const proj = this.getProjection();
      if (!proj) return;
      const p = proj.fromLatLngToDivPixel(new google.maps.LatLng(this.position.lat, this.position.lng));
      this.div.style.left = (p.x - 11) + 'px';
      this.div.style.top  = (p.y - 11) + 'px';
    }
    onRemove() { this.div.remove(); this.div = null; }
  }
  const o = new UserDotOverlay(USER_LOCATION);
  o.setMap(map);
}

function pickGooglePlace(placeId, name) {
  if (!placesService) return;
  placesService.getDetails({ placeId, fields: ['name', 'geometry'] }, (place, status) => {
    if (status !== google.maps.places.PlacesServiceStatus.OK || !place.geometry) {
      alert('Could not fetch place details');
      return;
    }
    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();
    if (!isInsidePyrenees(lat, lng)) {
      alert(`"${name}" is outside the Pyrenees area covered by this app.`);
      return;
    }
    document.getElementById('mainSearch').value = name;
    closeMainSearch();

    clearRouteVisuals();
    if (endMarker)   { endMarker.setMap(null);   endMarker = null; }
    if (startMarker) { startMarker.setMap(null); startMarker = null; }
    startSel = { lat: USER_LOCATION.lat, lng: USER_LOCATION.lng, name: 'Your location' };
    endSel   = { lat, lng, name };
    endMarker = redPin({ lat, lng });
    computeRoute();
  });
}

  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.sub.toLowerCase().includes(q));

  let html = `
    <button class="suggestion-row" onclick="closeMainSearch()" style="background:#fafafa">
      <div class="suggestion-icon" style="background:#fff">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </div>
      <div class="suggestion-text">
        <div class="suggestion-name" style="color:#5f6368;font-weight:400">Back to map</div>
      </div>
    </button>`;
  if (list.length === 0) {
    html += `<div style="padding:24px;text-align:center;color:#80868b;font-size:14px">No matches in the Pyrenees catalog</div>`;
  } else {
    list.slice(0, 12).forEach(p => {
      const idx = POI_DATABASE.indexOf(p);
      html += `
        <button class="suggestion-row" onclick="pickMainSearchResult(${idx})">
          <div class="suggestion-icon">${getPoiIconSVG(p.icon)}</div>
          <div class="suggestion-text">
            <div class="suggestion-name">${p.name}</div>
            <div class="suggestion-sub">${p.sub}</div>
          </div>
        </button>`;
    });
  }
  box.innerHTML = html;
  box.classList.add('visible');
}

function closeMainSearch() {
  document.getElementById('suggestions').classList.remove('visible', 'from-search');
  document.getElementById('header').classList.remove('search-active');
  document.getElementById('mainSearch').placeholder = 'Search here';
  document.getElementById('mainSearch').blur();
  document.getElementById('mapTapHint').classList.remove('visible');
  activeInput = null;
}

function onMapTapForDestination(event) {
  // Only react if main search is active
  if (!document.getElementById('header').classList.contains('search-active')) return;
  const tapped = { lat: event.latLng.lat(), lng: event.latLng.lng() };

  document.getElementById('mainSearch').value = `Map point (${tapped.lat.toFixed(4)}, ${tapped.lng.toFixed(4)})`;
  closeMainSearch();

  clearRouteVisuals();
  if (endMarker)   { endMarker.setMap(null);   endMarker = null; }
  if (startMarker) { startMarker.setMap(null); startMarker = null; }
  startSel = { lat: USER_LOCATION.lat, lng: USER_LOCATION.lng, name: 'Your location' };
  endSel   = { lat: tapped.lat, lng: tapped.lng, name: 'Selected point' };
  endMarker = redPin(tapped);

  computeRoute();
}

function pickMainSearchResult(poiIndex) {
  const p = POI_DATABASE[poiIndex];
  document.getElementById('mainSearch').value = p.name;
  closeMainSearch();

  clearRouteVisuals();
  if (endMarker)   { endMarker.setMap(null);   endMarker = null; }
  if (startMarker) { startMarker.setMap(null); startMarker = null; }
  startSel = { lat: USER_LOCATION.lat, lng: USER_LOCATION.lng, name: 'Your location' };
  endSel   = { lat: p.lat, lng: p.lng, name: p.name };
  endMarker = redPin({ lat: p.lat, lng: p.lng });

  computeRoute();
}

function computeRoute() {
  if (!graph) return;
  const s = startSel || { lat: USER_LOCATION.lat, lng: USER_LOCATION.lng, name: 'Your location' };
  const e = endSel;
  if (!e) return;
  clearRouteVisuals();

  const startId = nearestNode(s);
  const endId   = nearestNode(e);
  const startSnap = graph.nodes[startId];
  const endSnap   = graph.nodes[endId];
  const result = dijkstra(startId, endId);
  if (!result || result.edges.length === 0) {
    // Fallback: no OSM trail connection — show a straight-line estimate honestly
    const crowKm = segDistanceKm(s, e);
    routePolyline = new google.maps.Polyline({
      path: [s, e],
      strokeOpacity: 0, strokeWeight: 0,
      icons: [{
        icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, strokeColor: '#ea4335', scale: 4 },
        offset: '0', repeat: '14px',
      }],
      map, zIndex: 25,
    });
    document.getElementById('routeDist').textContent = `~${crowKm.toFixed(1)} km`;
    document.getElementById('routeTime').textContent = '—';
    document.getElementById('routeSegs').textContent = 'off-trail';
    document.getElementById('routeSummary').classList.add('visible');
    document.querySelector('.route-summary-title span').textContent = 'Not connected via marked trails';
    const bounds = new google.maps.LatLngBounds();
    bounds.extend(s); bounds.extend(e);
    map.fitBounds(bounds, 80);
    return;
  }
  document.querySelector('.route-summary-title span').textContent = 'Route found';

  // Stitch full edge geometry (TRAIL ONLY — no connector lines yet)
  const coords = [];
  result.edges.forEach((edge, i) => {
    const ec = edge.coords;
    if (i === 0) coords.push(...ec);
    else coords.push(...ec.slice(1));
  });

  routePolyline = new google.maps.Polyline({
    path: coords, map,
    strokeColor: '#1a73e8', strokeOpacity: 1, strokeWeight: 7,
    zIndex: 25,
  });

  // If the destination is off-trail (> ~40m from nearest node), draw dashed connector + snap dot
  const offTrailDistEnd = segDistanceKm(e, endSnap) * 1000;
  if (offTrailDistEnd > 40) {
    endSnapMarker = snapDot(endSnap);
    offRouteLine = new google.maps.Polyline({
      path: [endSnap, e],
      strokeOpacity: 0, strokeWeight: 0,
      icons: [{
        icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, strokeColor: '#5f6368', scale: 3 },
        offset: '0', repeat: '10px',
      }],
      map, zIndex: 24,
    });
  }

  // Same for the start side: dashed connector from user dot to first trail node
  const offTrailDistStart = segDistanceKm(s, startSnap) * 1000;
  if (offTrailDistStart > 40) {
    startOffRouteLine = new google.maps.Polyline({
      path: [s, startSnap],
      strokeOpacity: 0, strokeWeight: 0,
      icons: [{
        icon: { path: 'M 0,-1 0,1', strokeOpacity: 1, strokeColor: '#5f6368', scale: 3 },
        offset: '0', repeat: '10px',
      }],
      map, zIndex: 24,
    });
  }

  const counts = { easy: 0, moderate: 0, hard: 0 };
  result.edges.forEach(edge => counts[edge.difficulty]++);
  const dominant = Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];

  document.getElementById('routeDist').textContent = `${result.distance.toFixed(1)} km`;
  document.getElementById('routeTime').textContent = estTime(result.distance, dominant);
  document.getElementById('routeSegs').textContent = result.edges.length;
  document.getElementById('routeSummary').classList.add('visible');

  // Fit map to route + endpoints
  const bounds = new google.maps.LatLngBounds();
  coords.forEach(c => bounds.extend(c));
  bounds.extend(e);
  bounds.extend(s);
  map.fitBounds(bounds, 60);
}

  diff.textContent = SAC_LABEL[t.sac] || t.difficulty;
  diff.className = `sheet-diff ${t.difficulty}`;
  document.getElementById('sheetDist').textContent = `${km.toFixed(1)} km`;
  document.getElementById('sheetTime').textContent = estTime(km, t.difficulty);
  document.getElementById('sheetElev').textContent = '—';
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
