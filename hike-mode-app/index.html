<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HikeMode"/>
<meta name="theme-color" content="#137333"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>HikeMode – Pyrenees</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Roboto', 'Helvetica Neue', sans-serif; }

  #map { position: fixed; inset: 0; }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: env(safe-area-inset-top, 12px) 12px 0;
    pointer-events: none;
  }
  .search-pill {
    background: white; border-radius: 28px; box-shadow: 0 2px 12px rgba(0,0,0,.22);
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    pointer-events: auto;
  }
  .search-pill span { color: #5f6368; font-size: 22px; }
  .search-pill p  { color: #3c4043; font-size: 15px; font-weight: 500; flex: 1; }

  /* ── Mode badge ── */
  .mode-badge {
    position: fixed; top: calc(env(safe-area-inset-top, 12px) + 68px);
    left: 50%; transform: translateX(-50%); z-index: 20;
    background: #137333; color: white; padding: 7px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 700; letter-spacing: .5px;
    box-shadow: 0 2px 12px rgba(19,115,51,.45); opacity: 0;
    transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  .mode-badge.visible { opacity: 1; }

  /* ── Bottom bar ── */
  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 12px 16px calc(env(safe-area-inset-bottom, 16px) + 12px);
    background: white; box-shadow: 0 -2px 16px rgba(0,0,0,.12);
    display: flex; align-items: center; gap: 12px;
  }
  .hike-btn {
    flex: 1; background: #f1f3f4; border: none; border-radius: 14px;
    padding: 16px; display: flex; align-items: center; justify-content: center;
    gap: 10px; font-size: 16px; font-weight: 700; color: #3c4043;
    cursor: pointer; transition: background .2s, color .2s;
    min-height: 56px;
  }
  .hike-btn.active { background: #137333; color: white; }
  .hike-btn .icon { font-size: 22px; }

  .legend-btn {
    background: #f1f3f4; border: none; border-radius: 14px;
    width: 56px; height: 56px; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ── Trail info sheet (slides up on trail tap) ── */
  .sheet {
    position: fixed; bottom: -260px; left: 0; right: 0; z-index: 30;
    background: white; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.15);
    padding: 12px 20px calc(env(safe-area-inset-bottom, 16px) + 80px);
    transition: bottom .35s cubic-bezier(.4,0,.2,1);
  }
  .sheet.open { bottom: 0; }
  .sheet-handle {
    width: 36px; height: 4px; background: #e0e0e0; border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-name { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .sheet-diff {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700; margin-bottom: 14px;
  }
  .sheet-diff.easy   { background: #e8f5e9; color: #2e7d32; }
  .sheet-diff.medium { background: #fff8e1; color: #f57f17; }
  .sheet-diff.hard   { background: #ffebee; color: #c62828; }
  .sheet-stats {
    display: flex; gap: 0; border: 1px solid #f0f0f0; border-radius: 12px; overflow: hidden;
  }
  .stat {
    flex: 1; padding: 12px 8px; text-align: center;
    border-right: 1px solid #f0f0f0;
  }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 17px; font-weight: 700; color: #1a1a1a; }
  .stat-lbl { font-size: 11px; color: #9e9e9e; margin-top: 2px; }
  .close-sheet {
    position: absolute; top: 14px; right: 16px;
    background: #f5f5f5; border: none; border-radius: 50%;
    width: 30px; height: 30px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #757575;
  }

  /* ── Legend sheet ── */
  .legend-sheet {
    position: fixed; bottom: -280px; left: 0; right: 0; z-index: 30;
    background: white; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.15);
    padding: 12px 20px calc(env(safe-area-inset-bottom, 16px) + 80px);
    transition: bottom .35s cubic-bezier(.4,0,.2,1);
  }
  .legend-sheet.open { bottom: 0; }
  .legend-title { font-size: 16px; font-weight: 700; color: #137333; margin-bottom: 14px; }
  .legend-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; font-size: 15px; color: #3c4043; }
  .swatch { width: 32px; height: 6px; border-radius: 3px; flex-shrink: 0; }
  .legend-poi-row { display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid #f0f0f0; margin-top: 4px; }
  .poi-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #5f6368; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="search-pill">
    <span>☰</span>
    <p>Pyrénées – Ordesa National Park</p>
    <span>🔍</span>
  </div>
</div>

<!-- Mode badge -->
<div class="mode-badge" id="badge">🥾 HIKE MODE ON</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom bar -->
<div class="bottombar">
  <button class="hike-btn" id="hikeBtn" onclick="toggleHike()">
    <span class="icon">🥾</span>
    <span id="btnLabel">Hike Mode</span>
  </button>
  <button class="legend-btn" onclick="toggleLegend()" title="Legend">📋</button>
</div>

<!-- Trail info sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <button class="close-sheet" onclick="closeSheet()">✕</button>
  <div class="sheet-name" id="sheetName">–</div>
  <span class="sheet-diff" id="sheetDiff">–</span>
  <div class="sheet-stats">
    <div class="stat"><div class="stat-val" id="sheetDist">–</div><div class="stat-lbl">Distance</div></div>
    <div class="stat"><div class="stat-val" id="sheetTime">–</div><div class="stat-lbl">Est. time</div></div>
    <div class="stat"><div class="stat-val" id="sheetElev">–</div><div class="stat-lbl">Elevation</div></div>
  </div>
</div>

<!-- Legend sheet -->
<div class="legend-sheet" id="legendSheet">
  <div class="sheet-handle"></div>
  <button class="close-sheet" onclick="toggleLegend()">✕</button>
  <div class="legend-title">Trail difficulty</div>
  <div class="legend-row"><div class="swatch" style="background:#2e7d32"></div>Easy</div>
  <div class="legend-row"><div class="swatch" style="background:#f9a825"></div>Moderate</div>
  <div class="legend-row"><div class="swatch" style="background:#c62828"></div>Hard / High Route</div>
  <div class="legend-poi-row">
    <div class="poi-item">⛰ Peak</div>
    <div class="poi-item">🏠 Refuge</div>
    <div class="poi-item">👁 Viewpoint</div>
  </div>
</div>

<script>
const GOOGLE_API_KEY = 'YOUR_API_KEY_HERE';

const CENTER = { lat: 42.67, lng: 0.05 };
const ZOOM   = 12;

// Pyrenees bounding box — navigation locked here
const BOUNDS = {
  north: 42.85, south: 42.45,
  east:  0.55,  west: -0.45,
};

const hikeStyle = [
  { featureType: 'road',      elementType: 'geometry', stylers: [{ color: '#d4c5a9' }, { lightness: 20 }] },
  { featureType: 'road',      elementType: 'labels',   stylers: [{ visibility: 'off' }] },
  { featureType: 'poi',       elementType: 'all',      stylers: [{ visibility: 'off' }] },
  { featureType: 'transit',   elementType: 'all',      stylers: [{ visibility: 'off' }] },
  { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#e8e0d0' }] },
  { featureType: 'landscape.natural', elementType: 'geometry', stylers: [{ color: '#d4e6c3' }] },
  { featureType: 'water',     elementType: 'geometry', stylers: [{ color: '#a4c8e1' }] },
  { featureType: 'administrative', elementType: 'labels', stylers: [{ lightness: 40 }] },
];

const trails = [
  {
    name: 'Circo de Soaso',
    difficulty: 'easy', distance: '9.2 km', time: '3h 20', elev: '+480m',
    path: [
      {lat:42.638,lng:-0.057},{lat:42.645,lng:-0.042},{lat:42.655,lng:-0.028},
      {lat:42.662,lng:-0.015},{lat:42.671,lng:-0.002},{lat:42.678,lng:0.014},
    ],
    color: '#2e7d32', glow: '#66bb6a',
  },
  {
    name: 'Faja de Pelay',
    difficulty: 'medium', distance: '14.1 km', time: '5h 00', elev: '+820m',
    path: [
      {lat:42.640,lng:-0.055},{lat:42.650,lng:-0.040},{lat:42.660,lng:-0.020},
      {lat:42.670,lng:0.000},{lat:42.678,lng:0.025},{lat:42.682,lng:0.040},
    ],
    color: '#f9a825', glow: '#ffd54f',
  },
  {
    name: 'GR11 – High Pyrenean Route',
    difficulty: 'hard', distance: '22.5 km', time: '8h 30', elev: '+1640m',
    path: [
      {lat:42.700,lng:-0.080},{lat:42.695,lng:-0.055},{lat:42.690,lng:-0.030},
      {lat:42.688,lng:0.000},{lat:42.692,lng:0.030},{lat:42.698,lng:0.060},{lat:42.705,lng:0.090},
    ],
    color: '#c62828', glow: '#ef5350',
  },
  {
    name: 'Lago de Marboré',
    difficulty: 'medium', distance: '11.3 km', time: '4h 00', elev: '+1020m',
    path: [
      {lat:42.660,lng:0.020},{lat:42.668,lng:0.035},{lat:42.676,lng:0.055},
      {lat:42.685,lng:0.072},{lat:42.692,lng:0.090},
    ],
    color: '#f9a825', glow: '#ffd54f',
  },
  {
    name: 'Brèche de Roland',
    difficulty: 'hard', distance: '18.0 km', time: '7h 00', elev: '+1380m',
    path: [
      {lat:42.675,lng:0.000},{lat:42.682,lng:0.015},{lat:42.690,lng:0.032},
      {lat:42.700,lng:0.045},{lat:42.710,lng:0.055},
    ],
    color: '#c62828', glow: '#ef5350',
  },
];

const pois = [
  { lat:42.678, lng:0.014,  type:'peak',      label:'Monte Perdido 3355m' },
  { lat:42.710, lng:0.055,  type:'peak',      label:'Brèche de Roland 2807m' },
  { lat:42.660, lng:-0.020, type:'refuge',    label:'Refugio Góriz' },
  { lat:42.692, lng:0.090,  type:'refuge',    label:'Refuge de Sarradets' },
  { lat:42.655, lng:0.010,  type:'viewpoint', label:'Mirador de la Pradera' },
];

let map, hikeOn = false, legendOpen = false;
const polylines = [];
const markers   = [];

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: CENTER, zoom: ZOOM,
    mapTypeId: 'terrain',
    disableDefaultUI: true,
    gestureHandling: 'greedy',
    restriction: { latLngBounds: BOUNDS, strictBounds: false },
    zoomControl: false,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });

  trails.forEach(t => {
    const halo = new google.maps.Polyline({
      path: t.path, map,
      strokeColor: t.glow, strokeOpacity: 0, strokeWeight: 20,
      zIndex: 1, clickable: false,
    });
    const line = new google.maps.Polyline({
      path: t.path, map,
      strokeColor: '#b8a98a', strokeOpacity: 0.55, strokeWeight: 2.5,
      zIndex: 2,
    });
    line.addListener('click', () => openSheet(t));
    polylines.push({ line, halo, trail: t });
  });

  const poiIcons = { peak: '⛰', refuge: '🏠', viewpoint: '👁' };
  pois.forEach(p => {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng }, map,
      label: { text: poiIcons[p.type], fontSize: '20px' },
      title: p.label, visible: false, zIndex: 10,
      icon: { url: 'data:image/svg+xml;utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="1" height="1"/>', scaledSize: new google.maps.Size(1,1) },
    });
    markers.push(marker);
  });
}

function toggleHike() {
  hikeOn = !hikeOn;
  map.setOptions({ styles: hikeOn ? hikeStyle : [] });

  polylines.forEach(({ line, halo, trail }) => {
    line.setOptions(hikeOn
      ? { strokeColor: trail.color, strokeOpacity: 1,    strokeWeight: 5.5 }
      : { strokeColor: '#b8a98a',   strokeOpacity: 0.55, strokeWeight: 2.5 }
    );
    halo.setOptions({ strokeOpacity: hikeOn ? 0.28 : 0 });
  });

  markers.forEach(m => m.setVisible(hikeOn));

  document.getElementById('hikeBtn').classList.toggle('active', hikeOn);
  document.getElementById('btnLabel').textContent = hikeOn ? 'Hike Mode ON' : 'Hike Mode';
  document.getElementById('badge').classList.toggle('visible', hikeOn);

  if (!hikeOn) closeSheet();
}

function openSheet(t) {
  if (!hikeOn) return;
  document.getElementById('sheetName').textContent = t.name;
  const diff = document.getElementById('sheetDiff');
  diff.textContent = t.difficulty.charAt(0).toUpperCase() + t.difficulty.slice(1);
  diff.className = `sheet-diff ${t.difficulty}`;
  document.getElementById('sheetDist').textContent = t.distance;
  document.getElementById('sheetTime').textContent = t.time;
  document.getElementById('sheetElev').textContent = t.elev;
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
}

function toggleLegend() {
  legendOpen = !legendOpen;
  document.getElementById('legendSheet').classList.toggle('open', legendOpen);
}

// Register service worker for PWA installability
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap">
</script>
<script>
  // Replace the placeholder in the Maps script src with the actual key
  document.querySelectorAll('script[src*="maps.googleapis.com"]').forEach(s => {
    s.src = s.src.replace('YOUR_API_KEY_HERE', GOOGLE_API_KEY);
  });
</script>

</body>
</html>
